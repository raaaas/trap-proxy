version: '3.8'

services:
  trap-proxy:
    build: .
    container_name: trap-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./rules:/etc/trap   # mount rules for live editing
    networks:
      - caddy_network

networks:
  caddy_network:
    external: true
